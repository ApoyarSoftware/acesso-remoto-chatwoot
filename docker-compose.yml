version: "3.7"

services:
  acesso_remoto_app:
    image: ghcr.io/apoyarsoftware/acesso-remoto-chatwoot:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    networks:
      - ApoyarNet
    environment:
      - PORT=5000
      - DB_USER=postgres
      - DB_HOST=postgres
      - DB_DATABASE=crm_parceiro
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - DB_SSL=false
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
      - BYPASS_TOKEN=${BYPASS_TOKEN}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        # Configure o subdomínio que você deseja usar para o painel de acessos (ex: acessos.apoiozap.com.br)
        - traefik.http.routers.acesso_remoto.rule=Host(`remoto-acesso.apoiozap.com.br`)
        - traefik.http.routers.acesso_remoto.entrypoints=websecure
        - traefik.http.routers.acesso_remoto.tls.certresolver=letsencryptresolver
        - traefik.http.routers.acesso_remoto.priority=1
        - traefik.http.routers.acesso_remoto.service=acesso_remoto_app
        - traefik.http.services.acesso_remoto_app.loadbalancer.server.port=5000
        - traefik.http.services.acesso_remoto_app.loadbalancer.passhostheader=true
        - traefik.http.middlewares.acessos_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.acesso_remoto.middlewares=acessos_sslheader@docker

networks:
  ApoyarNet:
    external: true
    name: ApoyarNet
